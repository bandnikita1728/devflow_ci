services:
  # Database Layer
  postgres:
    image: postgres:15-alpine
    container_name: devflow_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devflow
    ports:
      - "5433:5432"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: devflow_pgbouncer
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=devflow
      - POOL_MODE=transaction
    ports:
      - "6432:6432"
    depends_on:
      - postgres

  # Queue Layer (Redis A)
  redis-queue:
    image: redis:7-alpine
    container_name: devflow_redis_queue
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-devflow}"
    ports:
      - "6379:6379"

  # App Cache (Redis B)
  redis-cache:
    image: redis:7-alpine
    container_name: devflow_redis_cache
    ports:
      - "6380:6379"

  # ── API Gateway ──────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: devflow_api_gateway
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@pgbouncer:6432/devflow
      - REDIS_QUEUE_HOST=redis-queue
      - REDIS_QUEUE_PORT=6379
      - PORT=3001
    depends_on:
      - pgbouncer
      - redis-queue

  # ── Worker (horizontally scalable) ───────────────────────────────────────────
  # Scale with: docker compose up --scale worker=N
  # Each instance processes WORKER_CONCURRENCY jobs in parallel.
  # BullMQ's atomic job claiming (Redis BRPOPLPUSH) guarantees no double-processing.
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@pgbouncer:6432/devflow
      - REDIS_QUEUE_HOST=redis-queue
      - REDIS_QUEUE_PORT=6379
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-5}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - pgbouncer
      - redis-queue
    deploy:
      replicas: ${WORKER_REPLICAS:-3}
    restart: unless-stopped
    stop_grace_period: 35s  # 30s drain + 5s buffer before SIGKILL

